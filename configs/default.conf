server {
    listen 127.0.0.1:8080;
    server_name default_server;
    root ./www/default;
    index index.html;
    client_max_body_size 1048576;

    error_page 400 ./www/errors/400.html;
    error_page 403 ./www/errors/403.html;
    error_page 404 ./www/errors/404.html;
    error_page 405 ./www/errors/405.html;
    error_page 413 ./www/errors/413.html;
    error_page 500 ./www/errors/500.html;
    error_page 501 ./www/errors/501.html;
    error_page 502 ./www/errors/502.html;
    error_page 504 ./www/errors/504.html;

    location / {
        methods GET POST DELETE;
        root ./www/default;
        index index.html;
        autoindex off;
        upload_enable off;
    }

    location /static {
        methods GET;
        root ./www/default/static;
        index index.html;
        autoindex on;
        upload_enable off;
    }

    location /uploads {
        methods GET POST DELETE;
        root ./www/default/uploads;
        autoindex off;
        upload_enable on;
        upload_store ./www/default/uploads;
    }

    location /redirect-me {
        methods GET;
        return 301 /;
    }

    location /cgi-bin {
        methods GET POST;
        root ./www/default/cgi-bin;
        autoindex off;
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php-cgi;
    }
}

server {
    listen 127.0.0.1:8081;
    server_name secondary_server;
    root ./www/secondary;
    index index.html;
    client_max_body_size 2097152;

    error_page 404 ./www/errors/404.html;
    error_page 500 ./www/errors/500.html;

    location / {
        methods GET POST DELETE;
        root ./www/secondary;
        index index.html;
        autoindex off;
        upload_enable off;
    }
}